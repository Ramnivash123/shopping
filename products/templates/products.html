<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Product Categories</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background-color:#e8f5e9;">

    <!-- Top Bar -->
    <div style="background:#2e7d32; padding:15px 30px; display:flex; justify-content:space-between; align-items:center;">
        <div style="display:flex; align-items:center; gap:12px;">

            <!-- Logo Box -->
            <div style="width:40px; height:40px;
                        background:white; color:#2e7d32;
                        display:flex; justify-content:center; align-items:center;
                        font-size:20px; font-weight:bold;
                        border-radius:8px;">
                S
            </div>

            <h3 style="color:white; margin:0;">Products</h3>
        </div>

        <a href="/signout"
           style="background:white; color:#2e7d32; text-decoration:none;
                  padding:8px 15px; border-radius:5px; font-weight:bold;">
            Logout
        </a>
    </div>

    <!-- Horizontal Categories -->
    <div style="background:white; padding:15px 30px; display:flex; gap:20px;">

        <a href="/products/electronics"
           style="color:#2e7d32; text-decoration:none; font-weight:bold;">
            Electronics
        </a>

        <a href="/products/clothing"
           style="color:#2e7d32; text-decoration:none; font-weight:bold;">
            Clothing
        </a>

        <a href="/products/footwear"
           style="color:#2e7d32; text-decoration:none; font-weight:bold;">
            Footwear
        </a>

        <a href="/products/books"
           style="color:#2e7d32; text-decoration:none; font-weight:bold;">
            Books
        </a>

    </div>

    <!-- Page Content -->
    <div style="padding:30px; display:flex; flex-wrap:wrap; gap:20px;">

        {% for product in pr %}

            <div style="background:white; width:220px; padding:15px;
                        border-radius:8px;
                        box-shadow:0 4px 10px rgba(0,0,0,0.1);">

                <form method="post" action="/addcart/">
                    {% csrf_token %}

                    <img src="{% static product.image %}"
                         style="width:100%; height:150px; object-fit:cover; border-radius:5px;">

                    <h4 style="margin:10px 0 5px 0;">
                        {{ product.name }}
                    </h4>

                    <p style="color:#2e7d32; font-weight:bold;">
                        ₹{{ product.price }}
                    </p>

                    <!-- Hidden field to send product id -->
                    <input type="hidden" name="product_id" value="{{ product.id }}">

                    Qty:
                    <input type="number" name="product_qty" min="1" value="1" required>

                    <br><br>
                    <button type="submit">Buy</button>

                </form>

            </div>

        {% endfor %}

    </div>


</body>
</html>

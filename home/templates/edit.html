<!DOCTYPE html>
<html>
<head>
    <title>Edit</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background-color:#e8f5e9;">

    <!-- Main Content -->
    <div style="max-width: 900px; margin: 40px auto; background: white; padding: 30px;
                border-radius: 10px; box-shadow: 0 6px 15px rgba(0,0,0,0.1);">

        <!-- Logo Box -->
        <div style="width:60px; height:60px; margin:0 auto 20px auto;
                    background:#2e7d32; color:white;
                    display:flex; justify-content:center; align-items:center;
                    font-size:28px; font-weight:bold;
                    border-radius:12px;">
            S
        </div>

        <h2 style="text-align:center; color:#2e7d32;">Edit Users</h2>

        <form method="post" action="/edited/{{usr.id}}/">
            {% csrf_token %}
            <table style="width: 100%; border-collapse: collapse; margin-top:20px;">
                <tr style="background-color: #2e7d32; color: white;">
                    <th style="padding: 12px; border: 1px solid #c8e6c9;">Username</th>
                    <th style="padding: 12px; border: 1px solid #c8e6c9;">Is_Superuser</th>
                    <th style="padding: 12px; border: 1px solid #c8e6c9;">Update</th>
                </tr>


                <tr style="text-align:center;">
                    <td style="padding: 10px; border: 1px solid #e0e0e0;">
                        <input type="text" name="username" value="{{usr.username}}">
                    </td>
                    <td style="padding: 10px; border: 1px solid #e0e0e0;">
                        <input type="text" name="is_superuser" value="{{usr.is_superuser}}">
                    </td>
                    <td style="padding: 10px; border: 1px solid #e0e0e0;">
                        <button type="submit">Submit</button>
                    </td>
                </tr>
            </table>
        </form>


    </div>

</body>
</html>

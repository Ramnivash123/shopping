<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background-color:#e8f5e9; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="background:white; padding:40px; width:350px; border-radius:10px;
                box-shadow:0 6px 15px rgba(0,0,0,0.1); text-align:center;">

        <div style="width:60px; height:60px; margin:0 auto 20px auto;
                    background:#2e7d32; color:white;
                    display:flex; justify-content:center; align-items:center;
                    font-size:28px; font-weight:bold;
                    border-radius:12px;">
            S
        </div>

        <h2 style="color:#2e7d32; margin-bottom:25px;">Create Account</h2>

        <form method="post">
            {% csrf_token %}

            <div style="margin-bottom:15px; text-align:left;">
                <label style="color:#2e7d32; font-weight:bold;">Username</label><br>
                <input name="username" type="text"
                       style="width:100%; padding:8px; border:1px solid #a5d6a7;
                              border-radius:5px; outline:none;">
            </div>

            <div style="margin-bottom:20px; text-align:left;">
                <label style="color:#2e7d32; font-weight:bold;">Password</label><br>
                <input name="password" type="password"
                       style="width:100%; padding:8px; border:1px solid #a5d6a7;
                              border-radius:5px; outline:none;">
            </div>

            <button type="submit"
                    style="width:100%; padding:10px; background:#2e7d32;
                           color:white; border:none; border-radius:5px;
                           font-weight:bold; cursor:pointer;">
                Sign Up
            </button>
        </form>

        <!-- Signin Link -->
        <p style="margin-top:20px; font-size:14px;">
            Already a user?
            <a href="/signin"
               style="color:#2e7d32; font-weight:bold; text-decoration:none;">
               Sign in
            </a>
        </p>

    </div>

</body>
</html>
